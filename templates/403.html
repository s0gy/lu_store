{% extends "layout.html" %}

{% block title %}403 | 无权限{% endblock %}

{% block body %}
  <main class="auth-shell">
    <section class="auth-panel auth-panel-compact">
      <div class="auth-copy">
        <div class="auth-eyebrow">403 Forbidden</div>
        <h1>无权限访问</h1>
        <p>当前账户没有这个页面的访问权限。管理员页面只允许 `role = admin` 的账户进入。</p>
      </div>
      <div class="action-row">
        <a class="primary-btn link-btn" href="{{ url_for('quote') }}">返回报价页</a>
        <a class="secondary-btn link-btn" href="{{ url_for('account') }}">进入账户设置</a>
      </div>
    </section>
  </main>
{% endblock %}
