<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>领淘标签报价原型</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-main">lingtao</span>
        <span class="brand-dot">•</span>
        <span class="brand-sub">领淘</span>
      </div>
      <div class="topbar-tools">
        <div class="search">
          <input type="text" placeholder="搜索产品名称">
          <button type="button">搜索</button>
        </div>
        <div class="user-entry">欢迎您！袁镕贵</div>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div class="sidebar-section">使用前必读</div>
        <div class="sidebar-group">
          <div class="sidebar-title">产品管理</div>
          <a class="sidebar-link" href="#">服装吊牌</a>
          <div class="sidebar-title active">不干胶</div>
          <a class="sidebar-link current" href="#">不干胶</a>
          <a class="sidebar-link" href="#">电线胶</a>
          <a class="sidebar-link" href="#">胶带</a>
          <a class="sidebar-link" href="#">特光不干胶</a>
          <a class="sidebar-link" href="#">防伪标</a>
          <a class="sidebar-link" href="#">卷标标签</a>
          <a class="sidebar-link" href="#">水标</a>
          <a class="sidebar-link" href="#">插旗</a>
          <a class="sidebar-link" href="#">卡片</a>
          <a class="sidebar-link" href="#">包装纸</a>
        </div>
      </aside>

      <main class="main">
        <div class="tabs">
          <div class="tab active">首页</div>
          <div class="tab">不干胶</div>
        </div>

        <section class="content">
          <div class="section-header">
            <h1>不干胶</h1>
            <p>使用方法:选择对应的产品种类。输入正确的尺寸、数量后点击“计算”出价格(自动复制);</p>
          </div>

          <div class="content-grid">
            <section class="form-panel">
              <div class="inline-options">
                <label class="radio-item">
                  <input type="radio" name="mode" checked>
                  <span>常用种类</span>
                </label>
                <label class="radio-item">
                  <input type="radio" name="mode">
                  <span>专版打印</span>
                </label>
              </div>

              <div class="form-row">
                <label for="productType">品种</label>
                <select id="productType">
                  <option value="铜板纸不干胶">铜板纸不干胶</option>
                  <option value="透明不干胶">透明不干胶</option>
                  <option value="书写纸不干胶">书写纸不干胶</option>
                </select>
              </div>

              <div class="form-row">
                <label for="sizeInput">尺寸(CM/厘米) <span class="warn">输入格式: 长 * 宽</span></label>
                <input id="sizeInput" type="text" value="5*5" placeholder="例如 5*5">
              </div>

              <div class="form-row">
                <label for="quantityBase">数量(个)</label>
                <select id="quantityBase">
                  <option value="500">500</option>
                  <option value="1000">1000</option>
                  <option value="2000">2000</option>
                </select>
              </div>

              <div class="form-row">
                <label for="styleCount">款数</label>
                <input id="styleCount" type="number" min="1" value="1">
              </div>

              <div class="form-row">
                <label for="customerName">客户旺旺</label>
                <input id="customerName" type="text" placeholder="请输入客户旺旺号">
              </div>

              <div class="craft-panel">
                <div class="craft-title">工艺</div>
                <div class="craft-group">
                  <button type="button" class="chip active" data-group="cut" data-value="模切">模切</button>
                  <button type="button" class="chip" data-group="cut" data-value="裁切">裁切</button>
                </div>
                <div class="craft-group">
                  <button type="button" class="chip active" data-group="lamination" data-value="覆亮膜">覆亮膜</button>
                  <button type="button" class="chip" data-group="lamination" data-value="覆哑膜">覆哑膜</button>
                  <button type="button" class="chip" data-group="lamination" data-value="不覆膜">不覆膜</button>
                </div>
                <div class="craft-group">
                  <button type="button" class="chip" data-group="extra" data-value="配刮刮膜">配刮刮膜</button>
                  <button type="button" class="chip" data-group="extra" data-value="粘钻刮刮膜">粘钻刮刮膜</button>
                  <button type="button" class="chip" data-group="extra" data-value="烫金">烫金</button>
                </div>
              </div>

              <div class="action-row">
                <button id="calcButton" type="button" class="primary-btn">计算</button>
                <button id="resetButton" type="button" class="secondary-btn">重置</button>
              </div>

              <div class="result-block">
                <div class="result-header">
                  <h2>计算结果-</h2>
                  <button id="copyButton" type="button" class="copy-link">点击复制</button>
                </div>
                <textarea id="resultText" readonly></textarea>
              </div>
            </section>

            <aside class="preview-panel">
              <div class="preview-stage">
                <div class="preview-card">
                  <div class="preview-badge">YUMMY SNACKS</div>
                  <div class="preview-note">I LIKE THE TASTE</div>
                </div>
              </div>
              <div class="shipping-note">
                <h3>预计发货时间:</h3>
                <p>广东:数量500-1000张（顺丰14点前当天发货 普通快递16点前当天发货） 中通 圆通 顺丰;</p>
                <p>江苏:（3-4天发货） 韵达 顺丰;</p>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
