<aside class="sidebar">
  <div class="sidebar-panel">
    <div class="sidebar-section">导航</div>
    <div class="sidebar-group">
      <div class="sidebar-title">工作区</div>
      <a class="sidebar-link{% if active_page == 'quote' %} current{% endif %}" href="{{ url_for('quote') }}">在线报价</a>
      <a class="sidebar-link{% if active_page == 'account' %} current{% endif %}" href="{{ url_for('account') }}">账户设置</a>
      {% if current_user.role == "admin" %}
        <a class="sidebar-link{% if active_page == 'admin_dashboard' %} current{% endif %}" href="{{ url_for('admin_dashboard') }}">管理员后台</a>
        <a class="sidebar-link{% if active_page == 'admin_users' %} current{% endif %}" href="{{ url_for('admin_users') }}">账户管理</a>
      {% endif %}
    </div>

    {% if show_products %}
      <div class="sidebar-group">
        <div class="sidebar-title active">产品管理</div>
        {% for product in product_pages %}
          {% if product.endpoint == "quote" %}
            <a class="sidebar-link{% if active_product == product.slug %} current{% endif %}" href="{{ url_for('quote') }}">{{ product.name }}</a>
          {% else %}
            <a class="sidebar-link{% if active_product == product.slug %} current{% endif %}" href="{{ url_for('product_quote', product_slug=product.slug) }}">{{ product.name }}</a>
          {% endif %}
        {% endfor %}
      </div>
    {% endif %}
  </div>
</aside>
